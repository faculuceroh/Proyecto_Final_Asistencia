<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar · Asistencia QR</title>

  <!-- Google Fonts: Plus Jakarta Sans (legible, con personalidad) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Íconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Estilos -->
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
  <main class="auth-wrap">
    <section class="auth-card">
      <div class="auth-logo">
        <img src="assets/img/logo.png" alt="Logo institucional" />
        <div class="brand">
          <h1>Asistencia QR</h1>
          <p>Instituto · Portal de acceso</p>
        </div>
      </div>

      <form id="loginForm" autocomplete="on" novalidate>
        <div class="field">
          <label for="legajo">Legajo</label>
          <div class="input-group">
            <i class="input-icon fa-solid fa-id-card"></i>
            <input class="input" type="text" id="legajo" name="legajo"
                   placeholder="Ej: 20451" inputmode="numeric" required />
          </div>
          <p class="field-hint" id="rolHint">
            <i class="fa-solid fa-circle-info"></i> Tu rol se reconoce automáticamente por tu legajo.
          </p>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <div class="input-group">
            <i class="input-icon fa-solid fa-lock"></i>
            <input class="input" type="password" id="password" name="password"
                   placeholder="••••••••" required />
          </div>
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary btn-block btn-lg">
            <i class="fa-solid fa-right-to-bracket"></i> Ingresar
          </button>
        </div>

        <a href="password/recupero.php" class="auth-forgot">¿Olvidaste tu contraseña?</a>
      </form>

      <p class="auth-foot">© 2026 Instituto · Sistema de Asistencia por QR</p>
    </section>
  </main>

  <script src="assets/js/utils.js"></script>
  <script>
    // Demo: el rol se deduce del legajo (en producción lo determina el backend).
    // Convención de ejemplo según el primer dígito del legajo:
    //   2xxxx → Alumno · 1xxxx → Profesor · 3xxxx → Secretaría · 9xxxx → Admin
    const ROLES = {
      '2': { rol: 'alumno',     label: 'Alumno',     dest: 'alumno/dashboard.html' },
      '1': { rol: 'profesor',   label: 'Profesor',   dest: 'profesor/dashboard.html' },
      '3': { rol: 'secretaria', label: 'Secretaría', dest: 'secretaria/exportar.html' },
      '9': { rol: 'admin',      label: 'Admin',      dest: 'admin/dashboard.html' },
    };
    function detectRole(legajo) { return ROLES[(legajo.trim()[0] || '')] || null; }

    const legajoInput = document.getElementById('legajo');
    const hint = document.getElementById('rolHint');
    legajoInput.addEventListener('input', function () {
      const r = detectRole(this.value);
      hint.innerHTML = r
        ? '<i class="fa-solid fa-circle-check"></i> Ingresás como <strong>' + r.label + '</strong>'
        : '<i class="fa-solid fa-circle-info"></i> Tu rol se reconoce automáticamente por tu legajo.';
      hint.classList.toggle('is-ok', !!r);
    });

    // Mensajes de estado desde recuperación de contraseña
    (function () {
      const p = new URLSearchParams(location.search);
      const s = p.get('status');
      if (s === 'enviado')        App.toast('Si el legajo tiene un email registrado, recibirás el enlace en breve.', 'success');
      if (s === 'clave_cambiada') App.toast('Contraseña actualizada. Ya podés iniciar sesión.', 'success');
      if (s === 'error')          App.toast('Ocurrió un error. Intentá de nuevo.', 'error');
    })();

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const legajo   = legajoInput.value.trim();
      const password = this.password.value;
      if (!legajo || !password) {
        App.toast('Completá legajo y contraseña.', 'error');
        return;
      }
      App.api('login.php', {
        method: 'POST',
        loader: true,
        body: JSON.stringify({ legajo, password }),
      })
      .then(function (data) {
        App.toast('Bienvenido, ' + data.nombre + '!', 'success');
        const params = new URLSearchParams(location.search);
        let redirect = params.get('redirect');
        if (redirect) {
          try {
            const u = new URL(redirect);
            u.searchParams.delete('t'); // el token QR ya rotó, forzar re-escaneo
            redirect = u.toString();
          } catch (_) {}
        }
        setTimeout(() => (window.location.href = redirect || data.dest), 800);
      })
      .catch(function (err) {
        App.toast(err.message, 'error');
      });
    });
  </script>
</body>
</html>
